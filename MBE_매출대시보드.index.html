<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBE 매출 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0a0b0f;--card:#12141c;--card2:#1a1d28;--card3:#222636;
  --border:#2a2e40;--gold:#e8b86d;--gold2:#f5d08a;
  --text:#e2e6f0;--sub:#6b7694;
  --green:#22c55e;--red:#ef4444;--blue:#60a5fa;
  --purple:#a78bfa;--orange:#fb923c;--teal:#2dd4bf;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

.hdr{background:linear-gradient(90deg,#0d0f18,#141828 50%,#0d0f18);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-brand{font-size:17px;font-weight:800;letter-spacing:1.5px;color:var(--gold);}
.hdr-sub{font-size:11px;color:var(--sub);letter-spacing:.5px;}
.hdr-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.hdr-date-wrap{display:flex;align-items:center;gap:8px;}
.hdr-date-lbl{font-size:11px;color:var(--sub);}
.date-input{background:var(--card2);border:1px solid var(--border);color:var(--gold);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;outline:none;cursor:pointer;width:130px;}
.date-input:focus{border-color:var(--gold);}
.upload-btn{background:var(--gold);color:#0a0b0f;border:none;border-radius:6px;padding:7px 16px;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;}
.upload-btn:hover{background:var(--gold2);transform:translateY(-1px);}
#fileInput{display:none;}

.filter-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;position:sticky;top:64px;z-index:99;height:50px;overflow-x:auto;}
.filter-bar::-webkit-scrollbar{height:0;}
.mode-btns{display:flex;gap:2px;margin-right:20px;flex-shrink:0;}
.mode-btn{padding:7px 18px;border:none;border-radius:6px;background:transparent;color:var(--sub);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;}
.mode-btn:hover{color:var(--text);background:var(--card2);}
.mode-btn.active{background:var(--gold);color:#0a0b0f;}
.divider{width:1px;background:var(--border);height:28px;margin:0 16px;flex-shrink:0;}
.chip-row{display:flex;gap:6px;align-items:center;overflow-x:auto;}
.chip-row::-webkit-scrollbar{height:0;}
.chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap;}
.chip:hover{border-color:var(--gold);color:var(--text);}
.chip.active{border-color:var(--gold);background:rgba(232,184,109,.12);color:var(--gold);}
.store-search-wrap{position:relative;margin-left:8px;}
.store-search{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:5px 14px 5px 30px;font-size:12px;outline:none;width:200px;transition:all .2s;}
.store-search:focus{border-color:var(--gold);width:260px;}
.store-search::placeholder{color:var(--sub);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:12px;pointer-events:none;}
.store-dd{position:absolute;top:calc(100% + 6px);left:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;width:300px;max-height:300px;overflow-y:auto;z-index:200;display:none;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.store-dd.open{display:block;}
.dd-item{padding:9px 14px;cursor:pointer;font-size:12px;border-bottom:1px solid rgba(42,46,64,.5);display:flex;align-items:center;gap:8px;}
.dd-item:hover{background:var(--card3);}
.dd-item:last-child{border-bottom:none;}
.dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.kpi-strip{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:72px;overflow-x:auto;}
.kpi-strip::-webkit-scrollbar{height:0;}
.kpi-item{flex:1;min-width:130px;padding:0 20px;border-right:1px solid var(--border);text-align:center;}
.kpi-item:last-child{border-right:none;}
.kpi-lbl{font-size:10px;color:var(--sub);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;}
.kpi-val{font-size:20px;font-weight:800;line-height:1;}
.kpi-chg{font-size:11px;margin-top:4px;font-weight:600;}
.up{color:var(--green);}.down{color:var(--red);}.neu{color:var(--sub);}.gold{color:var(--gold);}

.main{padding:24px 28px;}
.month-chips{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.month-chip{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.month-chip:hover{border-color:var(--sub);color:var(--text);}
.month-chip.active{border-color:var(--blue);background:rgba(96,165,250,.12);color:var(--blue);}
.month-chip.all.active{border-color:var(--gold);background:rgba(232,184,109,.12);color:var(--gold);}

.sec-title{font-size:11px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

.chart-row{display:grid;gap:16px;margin-bottom:20px;}
.cols-2{grid-template-columns:1fr 1fr;}
.cols-3{grid-template-columns:2fr 1fr 1fr;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.chart-title .sub{font-size:11px;color:var(--sub);font-weight:400;}
.chart-wrap{position:relative;}
.h200{height:200px;}.h260{height:260px;}.h320{height:320px;}

/* 예상마감 카드 - 개선 */
.fc-strip{background:linear-gradient(135deg,#141828,#1c1f2e);border:1px solid rgba(232,184,109,.25);border-radius:12px;padding:0;margin-bottom:20px;overflow:hidden;}
.fc-header{padding:14px 24px;border-bottom:1px solid rgba(232,184,109,.15);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.fc-header-title{font-size:13px;font-weight:700;color:var(--gold);}
.fc-date-info{font-size:11px;color:var(--sub);}
.fc-method{font-size:10px;color:rgba(232,184,109,.6);padding:3px 8px;border:1px solid rgba(232,184,109,.2);border-radius:10px;}
.fc-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0;}
.fc-item{padding:18px 24px;border-right:1px solid rgba(42,46,64,.5);}
.fc-item:last-child{border-right:none;}
.fc-lbl{font-size:10px;color:var(--sub);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
.fc-val{font-size:22px;font-weight:800;color:var(--gold);}
.fc-sub{font-size:11px;color:var(--sub);margin-top:4px;}
.fc-badge{display:inline-block;margin-top:6px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.fc-badge.pos{background:rgba(34,197,94,.15);color:var(--green);}
.fc-badge.neg{background:rgba(239,68,68,.15);color:var(--red);}
.fc-badge.neu{background:rgba(107,118,148,.15);color:var(--sub);}

/* 잔여일 표시 */
.day-pills{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.day-pill{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;}
.day-pill.wd{background:rgba(96,165,250,.15);color:var(--blue);}
.day-pill.we{background:rgba(251,146,60,.15);color:var(--orange);}

.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:1100px;}
.tbl thead th{background:var(--card2);color:var(--sub);padding:10px 12px;text-align:left;font-size:10px;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.tbl thead th:hover{color:var(--text);}
.tbl tbody td{padding:9px 12px;border-bottom:1px solid rgba(42,46,64,.4);white-space:nowrap;vertical-align:middle;}
.tbl tbody tr{cursor:pointer;}
.tbl tbody tr:hover td{background:rgba(255,255,255,.025);}
.tbl tbody tr:last-child td{border-bottom:none;}
.ch-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.mgr-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;}
.note-btn{background:none;border:1px solid var(--border);color:var(--sub);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.note-btn:hover{border-color:var(--gold);color:var(--gold);}
.note-btn.filled{border-color:rgba(232,184,109,.4);color:var(--gold);background:rgba(232,184,109,.06);}

.inactive-toggle{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--sub);}
.toggle-sw{width:32px;height:18px;background:var(--border);border-radius:9px;cursor:pointer;position:relative;transition:background .2s;}
.toggle-sw.on{background:rgba(232,184,109,.4);}
.toggle-sw::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;}
.toggle-sw.on::after{left:16px;}

.mgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:20px;}
.mgr-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.mgr-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.mgr-card-name{font-size:16px;font-weight:800;margin-bottom:12px;}
.mgr-card-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mgr-stat-val{font-size:18px;font-weight:700;}
.mgr-stat-lbl{font-size:10px;color:var(--sub);letter-spacing:.5px;margin-top:2px;}
.mgr-bar{height:3px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden;}
.mgr-bar-fill{height:100%;border-radius:2px;}

.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;}
.ch-card:hover{border-color:var(--gold);transform:translateY(-2px);}

.drill-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.drill-name{font-size:20px;font-weight:800;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:28px;width:480px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--sub);margin-bottom:16px;}
.modal textarea{width:100%;height:110px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px;font-size:13px;font-family:inherit;resize:vertical;outline:none;}
.modal textarea:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.btn-primary{background:var(--gold);color:#0a0b0f;border:none;padding:8px 20px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--sub);padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;}
.btn-ghost:hover{border-color:var(--sub);color:var(--text);}
.inactive-row td{opacity:.4;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:768px){
  .hdr,.filter-bar,.kpi-strip,.main{padding-left:16px;padding-right:16px;}
  .cols-2,.cols-3{grid-template-columns:1fr;}
  .fc-body{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-brand">MASTER BUNNY EDITION</div>
    <div class="hdr-sub">크리스에프앤씨 · 영업본부 매출 대시보드</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-date-wrap">
      <span class="hdr-date-lbl">데이터 기준일</span>
      <input type="date" class="date-input" id="dataDate" value="2026-06-30" onchange="onDateChange()">
    </div>
    <label class="upload-btn" for="fileInput">↑ 엑셀 업데이트</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>
</header>

<div class="filter-bar">
  <div class="mode-btns">
    <button class="mode-btn active" onclick="setMode('all',event)">전체현황</button>
    <button class="mode-btn" onclick="setMode('channel',event)">유통별</button>
    <button class="mode-btn" onclick="setMode('manager',event)">담당별</button>
    <button class="mode-btn" onclick="setMode('store',event)">매장개별</button>
  </div>
  <div class="divider"></div>
  <div class="chip-row" id="subChips"></div>
  <div class="store-search-wrap" id="ssWrap" style="display:none">
    <span class="search-icon">🔍</span>
    <input type="text" class="store-search" id="storeSearch" placeholder="매장명 / 담당 검색..." autocomplete="off" oninput="filterDD()">
    <div class="store-dd" id="storeDd"></div>
  </div>
</div>

<div class="kpi-strip" id="kpiStrip"></div>

<div class="main">
  <div class="month-chips" id="monthChips"></div>
  <div id="contentArea"></div>
</div>

<div class="overlay" id="noteOverlay">
  <div class="modal">
    <h3 id="noteTitle"></h3>
    <div class="modal-sub" id="noteSub"></div>
    <textarea id="noteText" placeholder="특이사항 입력&#10;예: 리뉴얼 공사중 / 담당자 변경 / 프로모션 진행 / 매장 이슈"></textarea>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeNote()">취소</button>
      <button class="btn-primary" onclick="saveNote()">저장</button>
    </div>
  </div>
</div>

// ══ 추정 파라미터 ══
const WD_FACTOR = 0.85;   // 주중 가중치
const WE_FACTOR = 1.40;   // 주말 가중치
const DAYS_IN_MONTH = [31,28,29,30,31,30,31,31,30,31,30,31]; // 2026년 기준 (3월 29일)

// 요일별 일수 카운트
function countDayTypes(year, month, fromDay, toDay) {
  let wd=0, we=0;
  for(let d=fromDay; d<=toDay; d++) {
    const dow = new Date(year, month-1, d).getDay();
    if(dow===0||dow===6) we++; else wd++;
  }
  return {wd, we};
}

// ══ 데이터 기준일 관리 ══
let DATA_DATE = new Date('2026-06-30');

function onDateChange() {
  const v = document.getElementById('dataDate').value;
  if(v) { DATA_DATE = new Date(v+'T00:00:00'); renderKPI(); renderContent(); }
}

// 기준일 분석
function getDateInfo() {
  const y = DATA_DATE.getFullYear();
  const m = DATA_DATE.getMonth()+1;
  const d = DATA_DATE.getDate();
  const lastDay = new Date(y, m, 0).getDate();
  const daysLeft = lastDay - d;
  const isMonthEnd = (d === lastDay);

  // 잔여일 요일 분석
  const rem = daysLeft>0 ? countDayTypes(y, m, d+1, lastDay) : {wd:0, we:0};
  // 경과일 요일 분석
  const elapsed = countDayTypes(y, m, 1, d);
  const equivEl  = elapsed.wd*WD_FACTOR + elapsed.we*WE_FACTOR;
  const equivRem = rem.wd*WD_FACTOR + rem.we*WE_FACTOR;

  // 다음달 분석 (7월 기준)
  const nm = m===12?1:m+1, ny = m===12?y+1:y;
  const ndLast = new Date(ny, nm, 0).getDate();
  const ndInfo = countDayTypes(ny, nm, 1, ndLast);
  const equivNext = ndInfo.wd*WD_FACTOR + ndInfo.we*WE_FACTOR;

  // 현재월 월이름
  const mNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  return {y,m,d,lastDay,daysLeft,isMonthEnd,rem,elapsed,equivEl,equivRem,ndInfo,equivNext,
    nm,mNames,curMonLabel:mNames[m-1],nextMonLabel:mNames[nm-1]};
}

// ══ 핵심 추정 함수 ══
// stores: 집계 대상 매장 배열
// 반환: {curForecast, nextForecast, curSales, prevSales, dayInfo}
function calcForecast(stores) {
  const info = getDateInfo();
  const {y,m,d,isMonthEnd,equivEl,equivRem,equivNext,nm,ny} = info;

  // 현재월 매출 (데이터에 들어있는 값)
  const curMonKey = info.curMonLabel; // e.g. '6월'
  const curSales  = stores.reduce((a,b)=>a+(b.monthly[curMonKey]||0),0);
  const prevSales = stores.reduce((a,b)=>a+(b.monthly_prev[curMonKey]||0),0);

  let curForecast, forecastNote;

  if(isMonthEnd) {
    // 월말 확정 — 다음달 추정
    curForecast = curSales;
    forecastNote = '확정';
  } else {
    // 월중 — 잔여일 가중 추정
    if(equivEl > 0) {
      const baseUnit = curSales / equivEl;
      const remaining = Math.round(baseUnit * equivRem);
      curForecast = curSales + remaining;
      forecastNote = `잔여 ${info.daysLeft}일 (주중${info.rem.wd}·주말${info.rem.we})`;
    } else {
      curForecast = curSales;
      forecastNote = '데이터 없음';
    }
  }

  // 다음달 추정: 전년 월별 비중 × 당해 성장률로 산출
  // 전년 현재월 실적
  const prevCurMon = stores.reduce((a,b)=>a+(b.monthly_prev[curMonKey]||0),0);
  // 전년 전체 누계 (1-6월)
  const prevTotal  = stores.reduce((a,b)=>a+b.prev_year,0);
  // 전년 이전 5개월 합 (현재월 제외)
  const prevOther  = prevTotal - prevCurMon;

  // 당해 전체 성장률 (1~현재월)
  const curTotal6  = stores.reduce((a,b)=>a+b.total,0);
  const growthRate = prevTotal>0 ? curTotal6/prevTotal : 1;

  // 전년 다음달 추정 (= 전년 7월 ≈ 전년 월평균 × 계절계수)
  // 계절계수: 전년 각 월 비중으로 산출
  // 다음달(7월) 전년 데이터는 없으므로, 직전 3개월 비중으로 근사
  const prev3Sum = ['4월','5월','6월'].reduce((a,m)=>a+stores.reduce((s,r)=>s+(r.monthly_prev[m]||0),0),0);
  const prev3Days = DAYS_IN_MONTH[3]+DAYS_IN_MONTH[4]+DAYS_IN_MONTH[5]; // Apr+May+Jun
  const prevDailyAvg = prev3Sum/prev3Days;

  // 7월 전년 추정 = 전년 일평균 × 7월 가중 일수
  const prevNextMon = Math.round(prevDailyAvg * equivNext);
  // 당해 7월 추정 = 전년 7월 추정 × 성장률 × 계절조정
  // 계절조정: 최근 3개월 성장률 사용
  const cur3Sum  = ['4월','5월','6월'].reduce((a,m)=>a+stores.reduce((s,r)=>s+(r.monthly[m]||0),0),0);
  const recentGr = prev3Sum>0 ? cur3Sum/prev3Sum : growthRate;
  const nextForecast = Math.round(prevNextMon * recentGr);

  return {curForecast, nextForecast, curSales, prevSales, prevNextMon,
    forecastNote, isMonthEnd, info, growthRate, recentGr};
}

// 개별 매장 추정
function calcStoreForecast(s) {
  const info = getDateInfo();
  const {isMonthEnd, equivEl, equivRem, equivNext} = info;
  const curKey = info.curMonLabel;
  const curSales = s.monthly[curKey]||0;

  let curForecast;
  if(isMonthEnd) {
    curForecast = curSales;
  } else {
    const baseUnit = equivEl>0 ? curSales/equivEl : 0;
    curForecast = curSales + Math.round(baseUnit * equivRem);
  }

  // 다음달 추정
  const prev3 = ['4월','5월','6월'].map(m=>s.monthly_prev[m]||0).reduce((a,b)=>a+b,0);
  const cur3  = ['4월','5월','6월'].map(m=>s.monthly[m]||0).reduce((a,b)=>a+b,0);
  const prev3days = DAYS_IN_MONTH[3]+DAYS_IN_MONTH[4]+DAYS_IN_MONTH[5];
  const prevDailyAvg = prev3/prev3days;
  const prevNextMon = Math.round(prevDailyAvg * equivNext);
  const recentGr = prev3>0 ? cur3/prev3 : 1;
  const nextForecast = Math.round(prevNextMon * recentGr);

  return {curForecast, nextForecast, curSales, isMonthEnd, info, prevNextMon};
}

const fmtM = n=>{const a=Math.abs(n||0);if(a>=100000000)return(n/100000000).toFixed(1)+'억';if(a>=10000)return Math.round(n/10000)+'만';return(n||0).toLocaleString('ko-KR');};
const pct  = (a,b)=>b?+((a/b-1)*100).toFixed(1):0;
const arr  = g=>g>0?'▲':g<0?'▼':'━';
const cls  = g=>g>0?'up':g<0?'down':'neu';

const getNote = n=>localStorage.getItem('mbe_'+n)||'';

function getActive(list){return showInactive?list:list.filter(s=>s.active);}
function getStores(){
  let l=STORES;
  if(mode==='channel'&&subFilter) l=l.filter(s=>s.channel===subFilter);
  if(mode==='manager'&&subFilter) l=l.filter(s=>s.manager===subFilter);
  if(mode==='store'  &&subFilter) l=l.filter(s=>s.name===subFilter);
  return l;
}
function getSales(s){return monthFilter?(s.monthly[monthFilter]||0):s.total;}
function getPrev(s) {return monthFilter?(s.monthly_prev[monthFilter]||0):s.prev_year;}
function agg(list){
  const a=getActive(list);
  const total=a.reduce((x,b)=>x+getSales(b),0);
  const prev=a.reduce((x,b)=>x+getPrev(b),0);
  return{total,prev,gr:pct(total,prev)};
}

// ══ 예상마감 스트립 (핵심 개선) ══
function fcStrip(stores) {
  const active = getActive(stores);
  const fc = calcForecast(active);
  const {curForecast,nextForecast,curSales,prevSales,prevNextMon,
         forecastNote,isMonthEnd,info,recentGr} = fc;
  const curGr = pct(curForecast, prevSales);
  const nextGr = pct(nextForecast, prevNextMon);
  const totalGr = pct(curForecast, prevSales);

  // 잔여일 표시
  let dayPills = '';
  if(!isMonthEnd && info.daysLeft>0) {
    const rem = info.rem;
    for(let d=info.d+1; d<=info.lastDay; d++) {
      const dt = new Date(info.y, info.m-1, d);
      const dow = dt.getDay();
      const isWe = dow===0||dow===6;
      dayPills += `<span class="day-pill ${isWe?'we':'wd'}">${d}일(${DOW_KO[dow]})</span>`;
    }
  }

  const methodText = isMonthEnd
    ? `${info.curMonLabel} 확정 · 전년 비중 + 주간/주말 비율로 ${info.nextMonLabel} 추정`
    : `전년 월별 비중 + 주중${WD_FACTOR}/주말${WE_FACTOR} 가중 · 잔여 ${info.daysLeft}일 반영`;

  return `<div class="fc-strip">
    <div class="fc-header">
      <span class="fc-header-title">🔮 추정마감</span>
      <span class="fc-date-info">기준일 ${info.y}년 ${info.m}월 ${info.d}일(${DOW_KO[new Date(info.y,info.m-1,info.d).getDay()]})</span>
      <span class="fc-method">${methodText}</span>
      ${dayPills?`<div class="day-pills">${dayPills}</div>`:''}
    </div>
    <div class="fc-body">
      <div class="fc-item">
        <div class="fc-lbl">${info.curMonLabel} ${isMonthEnd?'확정':'추정마감'}</div>
        <div class="fc-val">${fmtM(curForecast)}원</div>
        <div class="fc-sub">현재 ${fmtM(curSales)}원${!isMonthEnd?` · 추가 ${fmtM(curForecast-curSales)}원`:''}</div>
        <span class="fc-badge ${curGr>=0?'pos':'neg'}">${arr(curGr)} ${Math.abs(curGr).toFixed(1)}% 전년대비</span>
      </div>
      <div class="fc-item">
        <div class="fc-lbl">${info.nextMonLabel} 추정마감</div>
        <div class="fc-val">${fmtM(nextForecast)}원</div>
        <div class="fc-sub">전년 ${info.nextMonLabel} 추정 ${fmtM(prevNextMon)}원</div>
        <span class="fc-badge ${nextGr>=0?'pos':'neg'}">${arr(nextGr)} ${Math.abs(nextGr).toFixed(1)}% 전년대비</span>
      </div>
      <div class="fc-item">
        <div class="fc-lbl">1~${isMonthEnd?info.m:info.m}월 누계</div>
        <div class="fc-val">${fmtM(active.reduce((a,b)=>a+b.total,0))}원</div>
        <div class="fc-sub">전년 동기 ${fmtM(active.reduce((a,b)=>a+b.prev_year,0))}원</div>
        <span class="fc-badge ${totalGr>=0?'pos':'neg'}">${arr(totalGr)} ${Math.abs(totalGr).toFixed(1)}%</span>
      </div>
      <div class="fc-item">
        <div class="fc-lbl">최근 3개월 성장률</div>
        <div class="fc-val" style="color:${cc((recentGr-1)*100)}">${arr((recentGr-1)*100)} ${Math.abs((recentGr-1)*100).toFixed(1)}%</div>
        <div class="fc-sub">4~${info.curMonLabel} 전년대비</div>
        <span class="fc-badge neu">주중${WD_FACTOR} / 주말${WE_FACTOR} 가중</span>
      </div>
    </div>
  </div>`;
}

    return `<tr>
      <td style="font-weight:700;color:var(--gold)">${m}</td>
      <td style="font-weight:700">${fmtM(mV[i])}원</td>
      <td style="color:var(--sub)">${fmtM(mP[i])}원</td>
      <td style="font-weight:700;color:${cc(g)}">${arr(g)} ${Math.abs(g).toFixed(1)}%</td>
      <td style="color:var(--sub);font-size:11px">${fmtM(s.monthly_new[m]||0)} / ${fmtM(s.monthly_old[m]||0)}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="drill-hdr">
      <div style="font-size:22px;font-weight:800">${name}</div>
      <span class="ch-tag" style="background:rgba(0,0,0,.3);color:${CH_COLOR[s.channel]||'var(--sub)'}">${CH_SHORT[s.channel]||s.channel}</span>
      <span class="mgr-tag" style="color:${color}">● ${s.manager}</span>
      <span style="font-size:12px;color:var(--sub)">#${s.rank}위</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px">
      ${[
        {lbl:'26년 누계',val:fmtM(s.total)+'원',cls:'gold'},
        {lbl:'전년대비',val:`${arr(gr)} ${Math.abs(gr).toFixed(1)}%`,cls:cls(gr)},
        {lbl:'월 평균',val:fmtM(s.monthly_avg)+'원',cls:''},
        {lbl:`${info.curMonLabel} ${isMonthEnd?'확정':'추정마감'}`,val:fmtM(curForecast)+'원',cls:'gold'},
        {lbl:`${info.curMonLabel} ${isMonthEnd?'':'추정'} 신장율`,val:`${arr(curGr)} ${Math.abs(curGr).toFixed(1)}%`,cls:cls(curGr)},
        {lbl:`${info.nextMonLabel} 추정마감`,val:fmtM(nextForecast)+'원',cls:'gold'},
      ].map(k=>`<div class="chart-card" style="padding:14px">
        <div style="font-size:10px;color:var(--sub);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px">${k.lbl}</div>
        <div style="font-size:17px;font-weight:800" class="${k.cls}">${k.val}</div>
      </div>`).join('')}
    </div>
    <div class="chart-card" style="margin-bottom:20px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:11px;color:var(--sub);letter-spacing:.5px;font-weight:700;text-transform:uppercase">📝 특이사항</div>
        <button class="note-btn ${note?'filled':''}" onclick="openNote('${name.replace(/'/g,"\\'")}')"> ${note?'✏️ 수정':'➕ 입력'}</button>
      </div>
      <div id="noteDisplay" style="margin-top:8px;font-size:13px;color:${note?'var(--text)':'var(--sub)'}">
        ${note||'특이사항 없음'}
      </div>
    </div>
    <div class="chart-row cols-2" style="margin-bottom:20px">
      <div class="chart-card"><div class="chart-title">월별 매출 전년 비교</div><div class="chart-wrap h260"><canvas id="c_st_m"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">월별 신장율 추이</div><div class="chart-wrap h260"><canvas id="c_st_g"></canvas></div></div>
    </div>
    <div class="chart-row cols-2">
      <div class="chart-card">
        <div class="chart-title">월별 상세 실적</div>
        <div class="tbl-wrap" style="border:none">
          <table class="tbl" style="min-width:auto">
            <thead><tr><th>월</th><th>26년 매출</th><th>25년 실적</th><th>신장율</th><th>신상/이월</th></tr></thead>
            <tbody>${monthRows}</tbody>
          </table>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">${info.nextMonLabel} 추정마감 <span class="sub">전년비중 + 주중/주말 가중</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:8px">
          <div style="font-size:36px;font-weight:800;color:var(--gold)">${fmtM(nextForecast)}원</div>
          <div style="font-size:13px;color:var(--sub)">전년 ${info.nextMonLabel} 추정 ${fmtM(prevNextMon)}원</div>
          <div style="font-size:18px;font-weight:700;color:${cc(nextGr)}">${arr(nextGr)} ${Math.abs(nextGr).toFixed(1)}%</div>
          <div style="font-size:11px;color:var(--sub);margin-top:4px">주중 ${WD_FACTOR} / 주말 ${WE_FACTOR} 가중 적용</div>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{mkBarLine('c_st_m',MONTHS,mV,mP,'26년','25년');mkGrowthBar('c_st_g',MONTHS,mG);},50);
}

// ══ 매장 테이블 ══
function storeTable(list){
  const active=getActive(list).sort((a,b)=>a.rank-b.rank);
  const inactive=list.filter(s=>!s.active).sort((a,b)=>b.total-a.total);
  const rows=[...active,...(showInactive?inactive:[])];
  const info=getDateInfo();
  return `<div class="tbl-wrap"><table class="tbl">
    <thead><tr>
      <th onclick="sortTbl('rank')">순위</th><th onclick="sortTbl('name')">매장명</th>
      <th>채널</th><th>담당</th>
      <th onclick="sortTbl('total')">누계매출</th><th onclick="sortTbl('prev_year')">전년</th>
      <th onclick="sortTbl('growth')">신장율</th>
      <th>1월</th><th>전년비</th><th>2월</th><th>전년비</th>
      <th>3월</th><th>전년비</th><th>4월</th><th>전년비</th>
      <th>5월</th><th>전년비</th><th>6월</th><th>전년비</th>
      <th>${info.curMonLabel} ${info.isMonthEnd?'확정':'추정'}</th>
      <th>${info.nextMonLabel} 추정</th>
      <th>특이사항</th>
    </tr></thead>
    <tbody>
    ${rows.map(s=>{
      const gr=pct(s.total,s.prev_year);
      const color=MGR_COLOR[s.manager]||'var(--sub)';
      const note=getNote(s.name);
      const fc=calcStoreForecast(s);
      const rowCls=!s.active?'inactive-row':'';
      return `<tr class="${rowCls}" onclick="selectStore('${s.name.replace(/'/g,"\\'")}')">
        <td style="color:var(--gold);font-weight:700">${s.rank>900?'-':'#'+s.rank}</td>
        <td style="font-weight:700">${s.name}</td>
        <td><span class="ch-tag" style="background:rgba(0,0,0,.3);color:${CH_COLOR[s.channel]||'var(--sub)'}">${CH_SHORT[s.channel]||s.channel}</span></td>
        <td><span class="mgr-tag" style="color:${color}">● ${s.manager}</span></td>
        <td style="font-weight:700">${fmtM(s.total)}</td>
        <td style="color:var(--sub)">${fmtM(s.prev_year)}</td>
        <td style="font-weight:700;color:${cc(gr)}">${arr(gr)} ${Math.abs(gr).toFixed(1)}%</td>
        ${MONTHS.map(m=>{
          const mv=s.monthly[m]||0,pv=s.monthly_prev[m]||0,mg=pct(mv,pv);
          return `<td>${fmtM(mv)}</td><td style="color:${cc(mg)};font-size:10px">${arr(mg)}${Math.abs(mg).toFixed(0)}%</td>`;
        }).join('')}
        <td style="font-weight:700;color:var(--gold)">${fmtM(fc.curForecast)}</td>
        <td style="font-weight:700;color:var(--teal)">${fmtM(fc.nextForecast)}</td>
        <td onclick="event.stopPropagation()">
          <button class="note-btn ${note?'filled':''}" onclick="openNote('${s.name.replace(/'/g,"\\'")}')"> ${note?'📝':'➕'}</button>
        </td>
      </tr>`;
    }).join('')}
    </tbody></table></div>`;
}

function sortTbl(key){
  if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=key==='rank';}
  STORES.sort((a,b)=>{let va=a[key],vb=b[key];if(typeof va==='string')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);return sortAsc?va-vb:vb-va;});
  renderContent();
}
function selectStore(name){
  mode='store';subFilter=name;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===3));
  document.getElementById('ssWrap').style.display='block';
  document.getElementById('storeSearch').value=name;
  renderSubChips();renderKPI();renderContent();
}

// ══ 매장 드롭다운 ══
function initDD(){populateDD(getActive(STORES));}
function populateDD(list){
  document.getElementById('storeDd').innerHTML=list.slice(0,80).map(s=>
    `<div class="dd-item" onclick="selectStore('${s.name.replace(/'/g,"\\'")}')">
      <div class="dd-dot" style="background:${MGR_COLOR[s.manager]||'var(--sub)'}"></div>
      <div><div style="font-weight:600">${s.name}</div>
      <div style="font-size:10px;color:var(--sub)">${s.manager} · ${CH_SHORT[s.channel]||s.channel}</div></div>
    </div>`).join('');
}
function filterDD(){
  const q=document.getElementById('storeSearch').value.toLowerCase();
  const dd=document.getElementById('storeDd');
  if(!q){dd.classList.remove('open');return;}
  const f=STORES.filter(s=>s.name.toLowerCase().includes(q)||s.manager.includes(q));
  populateDD(f);dd.classList.toggle('open',f.length>0);
}
document.addEventListener('click',e=>{if(!e.target.closest('.store-search-wrap'))document.getElementById('storeDd')?.classList.remove('open');});
document.getElementById('storeSearch')?.addEventListener('focus',()=>{if(document.getElementById('storeSearch').value)document.getElementById('storeDd').classList.add('open');});

// ══ 메모 ══
function openNote(name){
  noteTarget=name;
  const s=STORES.find(x=>x.name===name);
  document.getElementById('noteTitle').textContent='📝 '+name;
  document.getElementById('noteSub').textContent=s?`${s.manager} 담당 · ${CH_SHORT[s.channel]||s.channel}`:'';
  document.getElementById('noteText').value=getNote(name);
  document.getElementById('noteOverlay').classList.add('open');
}
function closeNote(){document.getElementById('noteOverlay').classList.remove('open');}
function saveNote(){
  const v=document.getElementById('noteText').value.trim();
  if(v)localStorage.setItem('mbe_'+noteTarget,v);else localStorage.removeItem('mbe_'+noteTarget);
  closeNote();
  const d=document.getElementById('noteDisplay');
  if(d){d.textContent=v||'특이사항 없음';d.style.color=v?'var(--text)':'var(--sub)';}
  renderContent();
}

// ══ 차트 ══
const BASE={responsive:true,maintainAspectRatio:false,animation:{duration:350},
  plugins:{legend:{labels:{color:'#6b7694',font:{size:11}}},
    tooltip:{backgroundColor:'rgba(18,20,28,.95)',titleColor:'#e2e6f0',bodyColor:'#8892a4',borderColor:'#2a2e40',borderWidth:1}},
  scales:{x:{grid:{color:'rgba(42,46,64,.4)'},ticks:{color:'#6b7694',font:{size:11}}},
    y:{grid:{color:'rgba(42,46,64,.4)'},ticks:{color:'#6b7694',font:{size:11},callback:v=>fmtM(v)}}}};

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function mkBarLine(id,labels,bar,line,bL,lL){
  charts[id]=new Chart(document.getElementById(id),{data:{labels,datasets:[
    {type:'bar',label:bL,data:bar,backgroundColor:'rgba(232,184,109,.65)',borderRadius:5,borderSkipped:false},
    {type:'line',label:lL,data:line,borderColor:'rgba(96,165,250,.8)',borderWidth:2,pointRadius:3,pointBackgroundColor:'var(--blue)',fill:false,tension:.3}
  ]},options:{...BASE}});
}
function mkGrowthBar(id,labels,data){
  charts[id]=new Chart(document.getElementById(id),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:data.map(g=>g>=0?'rgba(34,197,94,.6)':'rgba(239,68,68,.6)'),borderRadius:5,borderSkipped:false}]},
    options:{...BASE,plugins:{...BASE.plugins,legend:{display:false}},
      scales:{...BASE.scales,y:{...BASE.scales.y,ticks:{...BASE.scales.y.ticks,callback:v=>v+'%'}}}}});
}
function mkHorzBar(id,labels,data,colors){
  charts[id]=new Chart(document.getElementById(id),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:5,borderSkipped:false}]},
    options:{...BASE,indexAxis:'y',plugins:{...BASE.plugins,legend:{display:false}}}});
}
function mkDoughnut(id,labels,data,colors){
  charts[id]=new Chart(document.getElementById(id),{type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors.map(c=>c+'88'),borderColor:colors,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:350},
      plugins:{legend:{position:'right',labels:{color:'#6b7694',font:{size:11}}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmtM(ctx.raw)}원`}}}}});
}

// ══ 엑셀 업데이트 ══
document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const mCols=[16,21,26,31,36,41],pCols=[17,22,27,32,37,42],nCols=[14,19,24,29,34,39],oCols=[15,20,25,30,35,40];
      const mNames=['1월','2월','3월','4월','5월','6월'];
      STORES=[];
      for(let i=2;i<rows.length;i++){
        const r=rows[i];if(!r[0])continue;
        const monthly={},mPrev={},mNew={},mOld={};
        mNames.forEach((m,idx)=>{monthly[m]=Number(r[mCols[idx]])||0;mPrev[m]=Number(r[pCols[idx]])||0;mNew[m]=Number(r[nCols[idx]])||0;mOld[m]=Number(r[oCols[idx]])||0;});
        let ch=String(r[2]||'');
        if(ch==='I (인샵)')ch='C (대리점)';
        if(r[0]==='덕평팩토리MB')ch='B (직영점)';
        const monthsActive=mNames.filter(m=>(monthly[m]||0)>0).length;
        const total=Number(r[5])||0;
        STORES.push({name:String(r[0]),channel:ch,manager:String(r[3]||'').trim()||'미배정',
          rank:Number(r[4])||999,total,monthly_avg:Number(r[6])||0,prev_year:Number(r[7])||0,
          growth:Number(r[8])||0,new_product:Number(r[10])||0,old_product:Number(r[12])||0,
          months_active:monthsActive,active:(monthsActive>=3&&total>0),
          monthly,monthly_prev:mPrev,monthly_new:mNew,monthly_old:mOld});
      }
      // 파일명에서 날짜 자동 감지 (예: 260629_매출자료.xlsx → 2026-06-29)
      const match=file.name.match(/(\d{2})(\d{2})(\d{2})/);
      if(match){
        const dateStr=`20${match[1]}-${match[2]}-${match[3]}`;
        document.getElementById('dataDate').value=dateStr;
        DATA_DATE=new Date(dateStr+'T00:00:00');
      }
      renderKPI();renderContent();
      alert(`✅ 업데이트 완료 — ${STORES.filter(s=>s.active).length}개 유효 / ${STORES.length}개 전체\n기준일: ${document.getElementById('dataDate').value}`);
      e.target.value='';
    }catch(err){alert('❌ 오류: '+err.message);}
  };
  reader.readAsBinaryString(file);
});

// ══ 초기화 ══
renderSubChips();renderMonthChips();renderKPI();renderContent();
</script>
